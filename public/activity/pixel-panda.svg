<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <!-- Simple pixel-style panda face -->
  <rect x="0" y="0" width="64" height="64" fill="#fff6fb"/>
  <!-- ears -->
  <rect x="8" y="6" width="10" height="10" fill="#1f1f1f" />
  <rect x="46" y="6" width="10" height="10" fill="#1f1f1f" />
  <!-- head outline -->
  <rect x="8" y="18" width="48" height="36" fill="#ffffff" />
  <!-- eyes patches -->
  <rect x="18" y="28" width="8" height="6" fill="#1f1f1f" />
  <rect x="38" y="28" width="8" height="6" fill="#1f1f1f" />
  <!-- eyes -->
  <rect x="20" y="30" width="3" height="3" fill="#ffffff" />
  <rect x="41" y="30" width="3" height="3" fill="#ffffff" />
  <!-- nose/mouth -->
  <rect x="30" y="36" width="4" height="3" fill="#1f1f1f" />
  <rect x="28" y="39" width="8" height="2" fill="#1f1f1f" />
  <!-- blush (pink) -->
  <rect x="16" y="36" width="4" height="2" fill="#ffb1d6" />
  <rect x="44" y="36" width="4" height="2" fill="#ffb1d6" />
  <!-- border to emphasize pixel look -->
  <rect x="7" y="17" width="50" height="38" fill="none" stroke="#000000" stroke-width="0" />
</svg>
